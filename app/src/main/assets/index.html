<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gym Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

        :root {
            /* Surfaces (deep neutrals with a hint of cool blue) */
            --bg:           #0b0d10;
            --bg-grad-1:    #0e1116;
            --bg-grad-2:    #07090c;
            --surface:      rgba(22, 26, 32, 0.78);
            --surface-solid:#161a20;
            --card:         #181c22;
            --card-hover:   #1f242c;
            --input-bg:     #11151a;

            /* Brand: vivid emerald with mint highlight */
            --primary:      #22d27a;
            --primary-dark: #17a85f;
            --primary-soft: rgba(34, 210, 122, 0.14);
            --primary-glow: rgba(34, 210, 122, 0.35);

            /* Accents */
            --blue:         #4f8cff;
            --blue-soft:    rgba(79, 140, 255, 0.16);
            --orange:       #ff7a45;
            --danger:       #ff5470;
            --danger-soft:  rgba(255, 84, 112, 0.14);

            /* Text */
            --text:     #f1f4f8;
            --text-sec: #9aa3b2;
            --text-mut: #5b6472;

            /* Lines & shadows */
            --border:      rgba(255, 255, 255, 0.06);
            --border-str:  rgba(255, 255, 255, 0.10);
            --shadow-sm:   0 1px 2px rgba(0,0,0,0.4);
            --shadow-md:   0 6px 20px rgba(0,0,0,0.35);
            --shadow-lg:   0 12px 40px rgba(0,0,0,0.45);
            --shadow-glow: 0 0 0 1px rgba(34,210,122,0.35), 0 8px 24px rgba(34,210,122,0.18);

            --radius-sm: 10px;
            --radius:    14px;
            --radius-lg: 18px;
            --radius-xl: 24px;

            --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
        }

        html, body {
            height: 100%;
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 16px;
            line-height: 1.5;
            letter-spacing: -0.005em;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            background:
                radial-gradient(1200px 600px at 80% -10%, rgba(34,210,122,0.08), transparent 60%),
                radial-gradient(900px 500px at -10% 110%, rgba(79,140,255,0.07), transparent 60%),
                linear-gradient(180deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
            background-attachment: fixed;
        }

        #app {
            max-width: 540px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 8px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); }

        /* ===== HEADER ===== */
        .header {
            background: var(--surface);
            -webkit-backdrop-filter: blur(18px) saturate(140%);
            backdrop-filter: blur(18px) saturate(140%);
            padding: 18px 20px 16px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            position: relative;
        }
        .header::after {
            content: ''; position: absolute; left: 50%; bottom: -1px;
            width: 60px; height: 2px; transform: translateX(-50%);
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.6;
        }
        .header h1 {
            font-size: 22px; font-weight: 800; letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .sub {
            font-size: 12px; color: var(--text-sec); margin-top: 4px;
            letter-spacing: 0.02em; font-weight: 500;
        }

        /* ===== BUTTONS ===== */
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 13px 22px; border: none; border-radius: var(--radius-sm);
            font-size: 15px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s var(--ease), background 0.2s var(--ease),
                        box-shadow 0.2s var(--ease), border-color 0.2s var(--ease), color 0.2s var(--ease);
            -webkit-tap-highlight-color: transparent;
            font-family: inherit; letter-spacing: -0.005em;
            white-space: nowrap;
        }
        .btn:active { transform: scale(0.96); }

        .btn-primary {
            background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #06281a;
            box-shadow: 0 1px 0 rgba(255,255,255,0.18) inset, 0 8px 24px rgba(34,210,122,0.28);
        }
        .btn-primary:hover { box-shadow: 0 1px 0 rgba(255,255,255,0.22) inset, 0 12px 32px rgba(34,210,122,0.38); }

        .btn-outline {
            background: rgba(255,255,255,0.02); color: var(--primary);
            border: 1px solid rgba(34,210,122,0.45);
            backdrop-filter: blur(8px);
        }
        .btn-outline:hover { background: var(--primary-soft); border-color: var(--primary); }

        .btn-danger {
            background: rgba(255,255,255,0.02); color: var(--danger);
            border: 1px solid rgba(255,84,112,0.45);
        }
        .btn-danger:hover { background: var(--danger-soft); border-color: var(--danger); }

        .btn-copy {
            background: linear-gradient(180deg, var(--blue) 0%, #3a6fd6 100%);
            color: #fff;
            box-shadow: 0 1px 0 rgba(255,255,255,0.18) inset, 0 8px 24px rgba(79,140,255,0.28);
        }
        .btn-full { width: 100%; }

        /* ===== LOAD SCREEN ===== */
        .load-screen {
            flex: 1; padding: 20px; display: flex;
            flex-direction: column; gap: 16px; overflow: hidden;
        }
        .load-screen .info {
            color: var(--text-sec); font-size: 14px; line-height: 1.6;
            background: var(--card); padding: 14px 16px; border-radius: var(--radius);
            border: 1px solid var(--border);
        }
        .load-screen .info code {
            color: var(--primary); font-size: 12.5px;
            font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
            background: var(--primary-soft); padding: 2px 6px; border-radius: 6px;
            display: inline-block; margin: 2px 0;
        }
        .load-screen textarea {
            flex: 1; min-height: 200px; background: var(--input-bg);
            color: var(--text); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 14px 16px; font-size: 13.5px;
            font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
            resize: none; line-height: 1.55;
            transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
        }
        .load-screen textarea:focus {
            outline: none; border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-soft);
        }
        .load-screen textarea::placeholder { color: var(--text-mut); }
        .error { color: var(--danger); font-size: 13px; min-height: 18px; font-weight: 500; }

        /* ===== DAY TABS ===== */
        .day-tabs {
            display: flex; overflow-x: auto;
            background: var(--surface);
            -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
            padding: 12px 14px; gap: 8px; flex-shrink: 0;
            scrollbar-width: none;
            border-bottom: 1px solid var(--border);
        }
        .day-tabs::-webkit-scrollbar { display: none; }
        .day-tab {
            flex-shrink: 0; padding: 9px 16px; border-radius: 999px;
            background: var(--card); color: var(--text-sec);
            font-size: 13px; font-weight: 600; cursor: pointer;
            border: 1px solid var(--border);
            transition: all 0.2s var(--ease); font-family: inherit;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .day-tab:hover { color: var(--text); background: var(--card-hover); }
        .day-tab.active {
            background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #06281a; border-color: transparent;
            box-shadow: 0 6px 16px rgba(34,210,122,0.3);
        }
        .day-tab .ck { font-size: 11px; line-height: 1; }

        /* ===== EXERCISE LIST ===== */
        .exercise-list {
            flex: 1; overflow-y: auto; padding: 14px;
            display: flex; flex-direction: column; gap: 12px;
            padding-bottom: 90px;
        }
        .exercise-card {
            background: var(--card); border-radius: var(--radius-lg);
            padding: 16px; border: 1px solid var(--border);
            transition: border-color 0.2s var(--ease), transform 0.2s var(--ease);
            position: relative;
        }
        .exercise-card:hover { border-color: var(--border-str); }
        .exercise-card .ord {
            display: inline-flex; align-items: center; justify-content: center;
            background: var(--primary-soft); color: var(--primary);
            width: 28px; height: 28px; border-radius: 8px;
            font-size: 12px; font-weight: 700; margin-right: 10px; vertical-align: middle;
            border: 1px solid rgba(34,210,122,0.25);
        }
        .exercise-card .nm {
            font-size: 15.5px; font-weight: 600; vertical-align: middle;
            letter-spacing: -0.01em;
        }
        .exercise-card .det {
            margin-top: 12px; font-size: 13px; color: var(--text-sec); line-height: 1.6;
            display: flex; flex-direction: column; gap: 3px;
            padding: 10px 12px; background: rgba(255,255,255,0.02);
            border-radius: 10px; border: 1px solid var(--border);
        }
        .exercise-card .reps-row { margin-top: 14px; }
        .exercise-card .reps-lbl {
            font-size: 11.5px; font-weight: 700; color: var(--text-sec);
            margin-bottom: 10px; display: block;
            text-transform: uppercase; letter-spacing: 0.08em;
        }
        .exercise-card .reps-boxes {
            display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
        }
        .exercise-card .rep-box {
            width: 56px; height: 50px; background: var(--input-bg); color: var(--text);
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            text-align: center; font-size: 18px;
            font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
            font-weight: 600;
            transition: border-color 0.15s var(--ease), background 0.15s var(--ease),
                        box-shadow 0.15s var(--ease);
        }
        .exercise-card .rep-box:focus {
            outline: none; border-color: var(--primary); background: #131820;
            box-shadow: 0 0 0 4px var(--primary-soft);
        }
        .exercise-card .rep-box::placeholder { color: var(--text-mut); font-size: 14px; font-weight: 400; }
        .exercise-card .rep-box.invalid {
            border-color: var(--danger); background: var(--danger-soft);
            box-shadow: 0 0 0 3px rgba(255,84,112,0.10);
        }
        .exercise-card .rep-box:not(:placeholder-shown):not(.invalid) {
            border-color: rgba(34,210,122,0.35); background: rgba(34,210,122,0.04);
        }
        .exercise-card .rep-add {
            width: 50px; height: 50px; background: transparent;
            border: 1.5px dashed var(--border-str); border-radius: var(--radius-sm);
            color: var(--primary); font-size: 22px; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s var(--ease);
        }
        .exercise-card .rep-add:hover { border-color: var(--primary); background: var(--primary-soft); }
        .exercise-card .rep-add:active { transform: scale(0.94); }

        .exercise-card .ex-comment-row {
            margin-top: 10px;
            display: flex; flex-direction: column; gap: 4px;
        }
        .exercise-card .ex-comment-lbl {
            font-size: 11px; color: var(--text-mut); font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .exercise-card .ex-comment {
            width: 100%; min-height: 36px; resize: vertical;
            background: var(--input-bg); color: var(--text);
            border: 1px solid var(--border); border-radius: 8px;
            font-size: 13px; font-family: inherit; font-weight: 500;
            padding: 8px 10px; line-height: 1.4;
            transition: border-color 0.15s var(--ease), background 0.15s var(--ease);
        }
        .exercise-card .ex-comment:focus {
            outline: none; border-color: var(--blue);
            background: rgba(79,140,255,0.06);
            box-shadow: 0 0 0 3px var(--blue-soft);
        }
        .exercise-card .ex-comment::placeholder { color: var(--text-mut); font-weight: 400; }
        .exercise-card .ex-comment:not(:placeholder-shown) {
            border-color: rgba(79,140,255,0.35);
            background: rgba(79,140,255,0.04);
        }

        /* ===== BOTTOM BAR ===== */
        .bottom-bar {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 540px;
            background: var(--surface);
            -webkit-backdrop-filter: blur(20px) saturate(140%);
            backdrop-filter: blur(20px) saturate(140%);
            border-top: 1px solid var(--border);
            padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
            display: flex; gap: 8px; z-index: 10;
            box-shadow: 0 -8px 32px rgba(0,0,0,0.4);
        }
        .bottom-bar .btn { flex: 1; padding: 12px 6px; font-size: 13px; }

        /* ===== WEEK VIEW ===== */
        .week-view {
            flex: 1; padding: 18px; display: flex;
            flex-direction: column; gap: 14px; overflow: hidden;
        }
        .week-view pre {
            flex: 1; background: var(--card); color: var(--text);
            border-radius: var(--radius-lg); padding: 18px;
            font-size: 13px; line-height: 1.7;
            overflow-y: auto; white-space: pre-wrap; word-break: break-word;
            border: 1px solid var(--border);
            font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
        }
        .week-view .acts { display: flex; gap: 8px; flex-shrink: 0; }
        .week-view .acts .btn { flex: 1; }

        /* ===== TOAST ===== */
        .toast {
            position: fixed; bottom: 96px; left: 50%; transform: translateX(-50%) translateY(8px);
            background: rgba(20, 24, 30, 0.92);
            -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
            color: var(--text); padding: 12px 22px;
            border-radius: 999px; font-size: 13.5px; font-weight: 600;
            opacity: 0; transition: opacity 0.25s var(--ease), transform 0.25s var(--ease);
            z-index: 100; pointer-events: none;
            border: 1px solid var(--border-str);
            box-shadow: 0 12px 32px rgba(0,0,0,0.5);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ===== HISTORY SCREEN ===== */
        .history-screen {
            flex: 1; padding: 18px; display: flex;
            flex-direction: column; gap: 14px; overflow: hidden;
        }
        .history-list {
            flex: 1; overflow-y: auto; display: flex;
            flex-direction: column; gap: 10px;
        }
        .history-item {
            background: var(--card); border-radius: var(--radius);
            padding: 14px 16px;
            display: flex; justify-content: space-between; align-items: center; gap: 12px;
            border: 1px solid var(--border);
            transition: border-color 0.2s var(--ease), background 0.2s var(--ease);
        }
        .history-item:hover { border-color: var(--border-str); background: var(--card-hover); }
        .history-item .hi-info { font-size: 14px; font-weight: 600; }
        .history-item .hi-date { font-size: 11.5px; color: var(--text-sec); margin-top: 4px; font-weight: 500; }
        .history-item .hi-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .history-item .hi-btn {
            padding: 8px 14px; border-radius: 8px; border: none;
            font-size: 12px; font-weight: 600; cursor: pointer;
            font-family: inherit;
            transition: transform 0.15s var(--ease), filter 0.15s var(--ease);
        }
        .history-item .hi-btn:active { transform: scale(0.95); }
        .hi-btn-load {
            background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #06281a;
        }
        .hi-btn-del { background: var(--danger-soft); color: var(--danger); }
        .hi-btn-del:hover { background: rgba(255,84,112,0.22); }

        /* ===== EMAIL ROW ===== */
        .email-row {
            display: flex; gap: 8px; align-items: center; flex-shrink: 0;
        }
        .email-input {
            flex: 1; background: var(--input-bg); color: var(--text);
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            padding: 12px 14px; font-size: 14px; font-family: inherit;
            transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
        }
        .email-input:focus {
            outline: none; border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-soft);
        }
        .email-input::placeholder { color: var(--text-mut); }
        .btn-email {
            background: linear-gradient(180deg, var(--orange) 0%, #e85f2e 100%);
            color: #fff; white-space: nowrap; flex-shrink: 0; padding: 12px 18px;
            box-shadow: 0 1px 0 rgba(255,255,255,0.18) inset, 0 8px 22px rgba(255,122,69,0.28);
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .exercise-card { animation: fadeUp 0.3s var(--ease) both; }
        .exercise-card:nth-child(2) { animation-delay: 0.04s; }
        .exercise-card:nth-child(3) { animation-delay: 0.08s; }
        .exercise-card:nth-child(4) { animation-delay: 0.12s; }
        .exercise-card:nth-child(5) { animation-delay: 0.16s; }
        .exercise-card:nth-child(n+6) { animation-delay: 0.2s; }
        .history-item { animation: fadeUp 0.3s var(--ease) both; }

        /* Empty state */
        .empty-state {
            color: var(--text-sec); text-align: center; margin-top: 60px;
            font-size: 14px; padding: 0 20px; line-height: 1.6;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="toast" class="toast"></div>

    <script>
    /* =========================================================
       STATE
       ========================================================= */
    const KEY = 'gymtracker_data';
    const HIST_KEY = 'gymtracker_history';
    const EMAIL_KEY = 'gymtracker_email';

    let state = { screen: 'load', days: [], selectedDay: 0, loadedAt: null };
    let history = []; // array of { id, label, days, savedAt, loadedAt }
    let emailTo = '';

    function save() { localStorage.setItem(KEY, JSON.stringify(state)); }
    function saveHistory() { localStorage.setItem(HIST_KEY, JSON.stringify(history)); }
    function saveEmail() { localStorage.setItem(EMAIL_KEY, emailTo); }
    function loadEmail() { emailTo = localStorage.getItem(EMAIL_KEY) || ''; }

    function load() {
        try {
            const s = JSON.parse(localStorage.getItem(KEY));
            if (s && s.days && s.days.length) { Object.assign(state, s); state.screen = 'tracker'; return true; }
        } catch(e) {}
        return false;
    }
    function loadHistory() {
        try { history = JSON.parse(localStorage.getItem(HIST_KEY)) || []; } catch(e) { history = []; }
    }

    /* =========================================================
       PARSER — convierte el texto pegado en estructura de datos
       ========================================================= */
    function parseRoutine(text) {
        const lines = text.split('\n');
        const days = [];
        let cur = null;

        for (let raw of lines) {
            const line = raw.trim();
            if (!line || /^-{2,}$/.test(line)) continue;

            // Día: ### **LUNES  o  ### LUNES  o  **LUNES  etc.
            const dayM = line.match(/^#{0,3}\s*\*{0,2}\s*([A-ZÁÉÍÓÚÑÜ]+)\s*\*{0,2}\s*$/i);
            if (dayM) {
                cur = { name: dayM[1].toUpperCase(), exercises: [] };
                days.push(cur);
                continue;
            }

            if (!cur) continue;

            // Ejercicio: 1. **Nombre:** series x reps | Peso: xxx
            let clean = line.replace(/\*\*/g, '');
            if (!/^\d+\./.test(clean)) continue;

            const pipeIdx = clean.indexOf('|');
            if (pipeIdx === -1) continue;

            const left  = clean.substring(0, pipeIdx).trim();
            const right = clean.substring(pipeIdx + 1).trim();

            const ordM = left.match(/^(\d+)\.\s*/);
            if (!ordM) continue;

            const order = parseInt(ordM[1]);
            const rest  = left.substring(ordM[0].length);

            // Separar nombre de series/reps por el primer ": <dígito>"
            const colM = rest.match(/^(.+?):\s*(\d.+)$/);
            if (!colM) continue;

            const name     = colM[1].trim();
            const expected = colM[2].trim();

            const wM = right.match(/^Peso:\s*([^|]+)/i);
            const weight = wM ? wM[1].trim() : right.split('|')[0].trim();

            // Nota opcional global del ejercicio: "| Notas: texto libre"
            const notesM = right.match(/\|\s*Notas:\s*(.+)$/i);
            const comment = notesM ? notesM[1].trim() : '';

            cur.exercises.push({ order, name, expected, weight, done: '', comment });
        }
        return days;
    }

    /* =========================================================
       GENERATE WEEK TEXT  (formato de salida ≈ input)
       ========================================================= */
    function genText() {
        let t = '';
        for (let i = 0; i < state.days.length; i++) {
            const d = state.days[i];
            if (i > 0) t += '\n---\n\n';
            t += '### **' + d.name + '**\n\n';
            for (const e of d.exercises) {
                t += e.order + '. **' + e.name + ':** ' + e.expected + ' | Peso: ' + e.weight;
                if (e.done && e.done.trim()) t += ' | Hecho: ' + e.done.trim();
                else t += ' | Hecho: —';
                if (e.comment && e.comment.trim()) t += ' | Notas: ' + e.comment.trim();
                t += '\n';
            }
            t += '\n';
        }
        return t.trim();
    }

    /* =========================================================
       RENDER
       ========================================================= */
    function render() {
        const app = document.getElementById('app');
        switch (state.screen) {
            case 'load':    renderLoad(app);    break;
            case 'tracker': renderTracker(app); break;
            case 'view':    renderView(app);    break;
            case 'history': renderHistory(app); break;
        }
    }

    // ---------- LOAD SCREEN ----------
    function renderLoad(app) {
        const hasHist = history.length > 0;
        app.innerHTML = `
        <div class="header">
            <h1>\u{1F4AA} Gym Tracker</h1>
            <div class="sub">Registro semanal de entrenamiento</div>
        </div>
        <div class="load-screen">
            <div class="info">
                Pegá tu rutina semanal completa.<br>Formato esperado:<br><br>
                <code>### **LUNES</code><br>
                <code>1. **Ejercicio:** series x reps | Peso: X kg</code>
            </div>
            <textarea id="inp" placeholder="Pegá tu rutina aquí..."></textarea>
            <div id="err" class="error"></div>
            <button class="btn btn-primary btn-full" onclick="handleLoad()">Cargar Semana</button>
            ${hasHist ? '<button class="btn btn-outline btn-full" onclick="showHistory()">Semanas anteriores (' + history.length + ')</button>' : ''}
        </div>`;
    }

    // ---------- TRACKER SCREEN ----------
    function renderTracker(app) {
        const day = state.days[state.selectedDay];

        const tabs = state.days.map((d, i) => {
            const all  = d.exercises.every(e => e.done && e.done.trim());
            const any  = d.exercises.some(e => e.done && e.done.trim());
            let ck = '';
            if (all) ck = '<span class="ck">\u2705</span>';
            else if (any) ck = '<span class="ck">\u{1F7E1}</span>';
            return '<button class="day-tab' + (i === state.selectedDay ? ' active' : '') +
                   '" onclick="selDay(' + i + ')">' + d.name + ck + '</button>';
        }).join('');

        const cards = day.exercises.map((e, idx) => {
            const vals = e.done ? e.done.split(',').map(v => v.trim()) : [];
            const count = Math.max(vals.length, guessSeriesCount(e.expected));
            const boxes = Array.from({ length: count }, (_, b) => {
                return `<input type="text" class="rep-box"
                            value="${esc(vals[b] || '')}"
                            placeholder="-"
                            inputmode="numeric"
                            data-d="${state.selectedDay}" data-e="${idx}" data-b="${b}"
                            oninput="updRepBox(this)">`;
            }).join('');
            const cmt = e.comment || '';
            return `
            <div class="exercise-card">
                <span class="ord">${e.order}</span>
                <span class="nm">${esc(e.name)}</span>
                <div class="det">
                    \u{1F4CB} ${esc(e.expected)}<br>
                    \u{1F3CB}\uFE0F ${esc(e.weight)}
                </div>
                <div class="reps-row">
                    <span class="reps-lbl">Series realizadas:</span>
                    <div class="reps-boxes" id="boxes-${state.selectedDay}-${idx}">
                        ${boxes}
                        <button class="rep-add" onclick="addBox(${state.selectedDay},${idx})">+</button>
                    </div>
                </div>
                <div class="ex-comment-row">
                    <span class="ex-comment-lbl">\u{1F4DD} Notas del ejercicio</span>
                    <textarea class="ex-comment"
                              placeholder="Opcional: cómo te fue, problemas, sensaciones..."
                              data-d="${state.selectedDay}" data-e="${idx}"
                              oninput="updExComment(this)">${esc(cmt)}</textarea>
                </div>
            </div>`;
        }).join('');

        app.innerHTML = `
        <div class="header"><h1>\u{1F4AA} Gym Tracker</h1></div>
        <div class="day-tabs">${tabs}</div>
        <div class="exercise-list">${cards}</div>
        <div class="bottom-bar">
            <button class="btn btn-primary" onclick="showView()">\u{1F4CA} Ver Semana</button>
            <button class="btn btn-copy"    onclick="copyWeek()">\u{1F4CB} Copiar</button>
            <button class="btn btn-danger"  onclick="newWeek()">\u{1F504} Nueva</button>
        </div>`;
    }

    // ---------- WEEK VIEW SCREEN ----------
    function renderView(app) {
        const txt = genText();
        const range = getDateRange();
        app.innerHTML = `
        <div class="header">
            <h1>\u{1F4CA} Resumen Semanal</h1>
            <div class="sub">${range.from} &mdash; ${range.to}</div>
        </div>
        <div class="week-view">
            <pre>${esc(txt)}</pre>
            <div class="email-row">
                <input type="email" id="email-inp" class="email-input"
                       value="${esc(emailTo)}"
                       placeholder="destinatario@gmail.com"
                       oninput="updEmail(this)">
                <button class="btn btn-email" onclick="sendEmail()">📧 Enviar</button>
            </div>
            <div class="acts">
                <button class="btn btn-copy" onclick="copyWeek()">📋 Copiar Todo</button>
                <button class="btn btn-outline" onclick="backTracker()">← Volver</button>
            </div>
        </div>`;
    }

    // ---------- HISTORY SCREEN ----------
    function renderHistory(app) {
        const items = history.map((h, i) => `
            <div class="history-item">
                <div>
                    <div class="hi-info">${esc(h.label)}</div>
                    <div class="hi-date">${h.savedAt || ''}</div>
                </div>
                <div class="hi-actions">
                    <button class="hi-btn hi-btn-load" onclick="loadWeek(${i})">Cargar</button>
                    <button class="hi-btn hi-btn-del"  onclick="delWeek(${i})">Borrar</button>
                </div>
            </div>`).join('');

        app.innerHTML = `
        <div class="header"><h1>\u{1F4C5} Semanas Guardadas</h1></div>
        <div class="history-screen">
            <div class="history-list">${items || '<div style="color:var(--text-sec);text-align:center;margin-top:40px">No hay semanas guardadas</div>'}</div>
            <button class="btn btn-outline btn-full" onclick="backLoad()">\u2190 Volver</button>
        </div>`;
    }

    /* =========================================================
       HANDLERS
       ========================================================= */
    function handleLoad() {
        const inp = document.getElementById('inp').value;
        const err = document.getElementById('err');

        if (!inp.trim()) { err.textContent = 'Pegá tu rutina primero.'; return; }

        const days = parseRoutine(inp);
        if (!days.length) { err.textContent = 'No se encontraron días. Verificá el formato (### **DÍA).'; return; }

        const total = days.reduce((s, d) => s + d.exercises.length, 0);
        if (!total) { err.textContent = 'No se encontraron ejercicios. Verificá el formato.'; return; }

        state.days = days;
        state.selectedDay = 0;
        state.screen = 'tracker';
        state.loadedAt = new Date().toISOString();
        save();
        render();
        toast(days.length + ' días, ' + total + ' ejercicios cargados');
    }

    function selDay(i) {
        state.selectedDay = i;
        save();
        render();
        // Scroll tabs to show active
        setTimeout(() => {
            const active = document.querySelector('.day-tab.active');
            if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }, 50);
    }

    let saveTimer = null;

    function validateRepValue(val) {
        if (val === '' || val === null || val === undefined) return true; // vacío es ok
        const n = parseInt(val, 10);
        return /^\d+$/.test(val.trim()) && n >= 1;
    }

    function guessSeriesCount(expected) {
        return 4;
    }

    function collectBoxValues(di, ei) {
        const container = document.getElementById('boxes-' + di + '-' + ei);
        if (!container) return state.days[di].exercises[ei].done || '';
        return Array.from(container.querySelectorAll('.rep-box'))
            .map(inp => inp.value.trim())
            .join(',');
    }

    function updRepBox(el) {
        const raw = el.value.trim();
        if (raw !== '' && !validateRepValue(raw)) {
            el.classList.add('invalid');
            return; // no guardar valor inválido
        }
        el.classList.remove('invalid');
        const di = parseInt(el.dataset.d);
        const ei = parseInt(el.dataset.e);
        state.days[di].exercises[ei].done = collectBoxValues(di, ei);
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => save(), 300);
    }

    function addBox(di, ei) {
        const container = document.getElementById('boxes-' + di + '-' + ei);
        if (!container) return;
        const b = container.querySelectorAll('.rep-box').length;
        const inp = document.createElement('input');
        inp.type = 'text'; inp.className = 'rep-box';
        inp.placeholder = '-';
        inp.inputMode = 'numeric';
        inp.dataset.d = di; inp.dataset.e = ei; inp.dataset.b = b;
        inp.addEventListener('input', function() { updRepBox(this); });
        container.insertBefore(inp, container.querySelector('.rep-add'));
        inp.focus();
    }

    function updExComment(el) {
        const di = parseInt(el.dataset.d);
        const ei = parseInt(el.dataset.e);
        state.days[di].exercises[ei].comment = el.value;
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => save(), 300);
    }

    function showView() { state.screen = 'view'; render(); }

    function backTracker() { state.screen = 'tracker'; render(); }

    function backLoad() { state.screen = 'load'; render(); }

    function showHistory() { state.screen = 'history'; render(); }

    async function copyWeek() {
        const txt = genText();
        try {
            await navigator.clipboard.writeText(txt);
            toast('Copiado al portapapeles \u2713');
        } catch(e) {
            // Fallback
            const ta = document.createElement('textarea');
            ta.value = txt; ta.style.cssText = 'position:fixed;opacity:0';
            document.body.appendChild(ta); ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            toast('Copiado al portapapeles \u2713');
        }
    }

    /* =========================================================
       DATE RANGE & EMAIL
       ========================================================= */
    const DAY_NUM = { LUNES:1, MARTES:2, MIERCOLES:3, 'MIÉRCOLES':3, JUEVES:4, VIERNES:5, SABADO:6, 'SÁBADO':6, DOMINGO:0 };

    function getDayDate(dayName, monday) {
        const dow = DAY_NUM[dayName.toUpperCase()];
        if (dow === undefined) return null;
        const off = dow === 0 ? 6 : dow - 1;
        const d = new Date(monday);
        d.setDate(monday.getDate() + off);
        return d;
    }

    function getDateRange() {
        const loadedAt = state.loadedAt ? new Date(state.loadedAt) : new Date();

        // Calcular el lunes de la semana en que se cargó la rutina
        const loadDow   = loadedAt.getDay();
        const mondayOff = loadDow === 0 ? -6 : 1 - loadDow;
        const monday    = new Date(loadedAt);
        monday.setDate(loadedAt.getDate() + mondayOff);

        const days = state.days && state.days.length ? state.days : [];
        const fmt  = d => String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0');

        const firstDate = days.length ? getDayDate(days[0].name, monday) : null;
        const lastDate  = days.length ? getDayDate(days[days.length - 1].name, monday) : null;

        return {
            from: firstDate ? fmt(firstDate) : fmt(monday),
            to:   lastDate  ? fmt(lastDate)  : fmt(new Date())
        };
    }

    function updEmail(el) {
        emailTo = el.value;
        saveEmail();
    }

    function sendEmail() {
        const email = emailTo.trim();
        if (!email) { toast('Escribí un email destino primero'); return; }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { toast('Email inválido'); return; }

        const range   = getDateRange();
        const subject = 'Resultados GYM: ' + range.from + ' - ' + range.to;
        const body    = genText();

        const url = 'mailto:' + encodeURIComponent(email)
                  + '?subject=' + encodeURIComponent(subject)
                  + '&body='    + encodeURIComponent(body);
        window.location.href = url;
    }

    function newWeek() {
        if (!confirm('\u00bfGuardar la semana actual en el historial antes de empezar una nueva?')) {
            if (confirm('\u00bfBorrar sin guardar? Se perder\u00e1 todo.')) {
                clearTimeout(saveTimer);
                state = { screen: 'load', days: [], selectedDay: 0, loadedAt: null };
                localStorage.removeItem(KEY);
                render();
            }
            return;
        }
        // Save to history
        const label = state.days.map(d => d.name).join(', ');
        const now = new Date();
        const savedAt = now.toLocaleDateString('es-AR') + ' ' + now.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
        history.push({ id: Date.now(), label, days: JSON.parse(JSON.stringify(state.days)), savedAt, loadedAt: state.loadedAt });
        saveHistory();

        clearTimeout(saveTimer);
        state = { screen: 'load', days: [], selectedDay: 0, loadedAt: null };
        localStorage.removeItem(KEY);
        render();
        toast('Semana guardada en historial');
    }

    function loadWeek(idx) {
        const h = history[idx];
        if (!h) return;
        state.days = JSON.parse(JSON.stringify(h.days));
        state.selectedDay = 0;
        state.screen = 'tracker';
        state.loadedAt = h.loadedAt || new Date().toISOString();
        save();
        render();
        toast('Semana cargada');
    }

    function delWeek(idx) {
        if (!confirm('\u00bfBorrar esta semana del historial?')) return;
        history.splice(idx, 1);
        saveHistory();
        render();
    }

    /* =========================================================
       UTILS
       ========================================================= */
    function esc(t) {
        const d = document.createElement('div');
        d.textContent = t;
        return d.innerHTML;
    }

    function toast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 2200);
    }

    // Scroll input into view when keyboard opens
    document.addEventListener('focusin', (e) => {
        if (e.target.tagName === 'INPUT') {
            setTimeout(() => e.target.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
        }
    });

    /* =========================================================
       INIT
       ========================================================= */
    loadHistory();
    loadEmail();
    load();
    render();
    </script>
</body>
</html>
